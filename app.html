<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>CCT · Registro en campo</title>
<style>
:root{
  --bg:#f4f6f9; --card:#ffffff; --line:#e2e8f0; --line2:#cbd5e1;
  --text:#0f172a; --text2:#475569; --text3:#94a3b8;
  --blue:#1f6feb; --blue-d:#1550b3; --green:#16a34a; --red:#dc2626;
  --radius:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans TC","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--blue);color:#fff}
.hdr .brand{font-size:17px;font-weight:800;letter-spacing:.02em}
.hdr .brand small{font-weight:500;opacity:.85;font-size:12px;margin-left:6px}
.lang{display:flex;gap:2px;background:rgba(255,255,255,.18);border-radius:10px;padding:2px}
.lang button{border:none;background:none;color:#fff;font-size:12px;font-weight:700;padding:5px 8px;border-radius:8px;cursor:pointer;opacity:.7}
.lang button.on{background:#fff;color:var(--blue);opacity:1}
.body{flex:1;padding:18px 16px;display:flex;flex-direction:column}
.view{display:none;flex:1;flex-direction:column}
.view.on{display:flex}
/* 首頁 */
.home{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8vh}
.home button{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:48px 12px;border:2px solid var(--line);border-radius:20px;background:var(--card);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:transform .1s}
.home button:active{transform:scale(.97)}
.home .ic{font-size:54px;line-height:1}
.home .tx{font-size:22px;font-weight:800}
.home .status .ic{color:var(--blue)} .home .hours .ic{color:var(--green)}
/* 表單 */
.back{align-self:flex-start;border:none;background:none;color:var(--blue);font-size:16px;font-weight:700;padding:4px 0 10px;cursor:pointer}
.lbl{font-size:14px;font-weight:800;color:var(--text2);margin:14px 2px 6px}
.inp,select.inp{width:100%;padding:16px;font-size:18px;border:1.5px solid var(--line2);border-radius:var(--radius);background:var(--card);color:var(--text);outline:none;-webkit-appearance:none}
select.inp{height:58px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 14px center}
.inp:focus,select.inp:focus{border-color:var(--blue)}
.inp[type=number]{text-transform:none}
.up{text-transform:uppercase}
.cur{font-size:14px;font-weight:600;margin:6px 2px 0;min-height:20px}
.cur .st{padding:2px 10px;border-radius:10px;font-weight:800}
.cur .hrs{color:var(--blue)}
.pname{font-size:17px;font-weight:800;color:var(--green);min-height:22px;margin:6px 2px 0}
.pname.miss{color:var(--text3);font-weight:600}
.hrow{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.hrow .hl{flex:0 0 42%;font-size:16px;font-weight:800;color:var(--text2)}
.hrow .hl small{display:block;font-size:11px;color:var(--text3);font-weight:500}
.hrow input{flex:1;padding:15px;font-size:18px;border:1.5px solid var(--line2);border-radius:12px;background:var(--card);color:var(--text);outline:none}
.hrow input:focus{border-color:var(--blue)}
.btn{width:100%;padding:18px;font-size:18px;font-weight:800;border:none;border-radius:var(--radius);cursor:pointer;margin-top:18px}
.btn.primary{background:var(--blue);color:#fff}
.btn.primary:active{background:var(--blue-d)}
.btn.ghost{background:var(--card);color:var(--text);border:1.5px solid var(--line2)}
.err{color:var(--red);font-size:14px;font-weight:600;margin:8px 2px;min-height:18px}
/* 卡片（密碼/完成） */
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:32px 22px;text-align:center;margin-top:6vh;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card .ic{font-size:48px}
.card .t{font-size:22px;font-weight:800;margin:10px 0 4px}
.card .s{font-size:14px;color:var(--text3);margin-bottom:18px;white-space:pre-line}
.row2{display:flex;gap:10px;margin-top:10px}
.row2 .btn{flex:1;margin-top:0}
.foot{text-align:center;font-size:11px;color:var(--text3);padding:12px}
.badge-dot{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;background:#ef4444;color:#fff;border-radius:9px;font-size:11px;font-weight:800;margin-left:5px}
.chip{display:inline-block;background:var(--card);border:1px solid var(--line2);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:600;cursor:pointer}
.home .ot .ic{color:#ea580c}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="brand">CCT <small id="hdr-sub">Registro en campo</small></div>
    <div class="lang">
      <button data-l="es" onclick="setLang('es')">ES</button>
      <button data-l="zh" onclick="setLang('zh')">中</button>
      <button data-l="en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="body">
    <!-- 首頁 -->
    <div class="view on" id="v-home">
      <div class="home">
        <button class="status" onclick="goStatus()"><div class="ic">🔧</div><div class="tx" id="t-status">Estado</div></button>
        <button class="hours" onclick="goHours()"><div class="ic">⏱️</div><div class="tx" id="t-hours">Horas</div></button>
        <button class="ot" onclick="goOt()" style="grid-column:1/-1"><div class="ic">📝</div><div class="tx" id="t-ot">Overtime</div></button>
      </div>
    </div>
    <!-- 狀態 -->
    <div class="view" id="v-status">
      <button class="back" onclick="home()" id="b-back1">‹</button>
      <label class="lbl" id="l-s-kind">Tipo</label>
      <select class="inp" id="s-kind" onchange="statusCur()"></select>
      <label class="lbl" id="l-s-num">Número</label>
      <input class="inp up" id="s-num" inputmode="text" autocomplete="off" oninput="statusCur()"/>
      <div class="cur" id="s-cur"></div>
      <label class="lbl" id="l-s-status">Estado</label>
      <select class="inp" id="s-status"></select>
      <label class="lbl" id="l-s-person">Personal</label>
      <input class="inp" id="s-person" inputmode="text" autocomplete="off" oninput="personLookup()"/>
      <div class="pname" id="s-pname"></div>
      <div class="err" id="s-err"></div>
      <button class="btn primary" id="s-submit" onclick="submitStatus()">Enviar</button>
    </div>
    <!-- 時數密碼 -->
    <div class="view" id="v-hgate">
      <button class="back" onclick="home()" id="b-back-hg">‹</button>
      <div class="card">
        <div class="ic">🔒</div>
        <div class="t" id="hg-t">Horas</div>
        <div class="s" id="hg-s">Ingrese la contraseña</div>
        <input type="password" class="inp" id="h-pass" onkeydown="if(event.key==='Enter')hoursUnlock()"/>
        <div class="err" id="hg-err"></div>
        <button class="btn primary" id="hg-btn" onclick="hoursUnlock()">Entrar</button>
      </div>
    </div>
    <!-- 時數 -->
    <div class="view" id="v-hours">
      <button class="back" onclick="home()" id="b-back2">‹</button>
      <label class="lbl" id="l-h-kind">Tipo</label>
      <select class="inp" id="h-kind" onchange="hoursRender()"></select>
      <label class="lbl" id="l-h-num">Número</label>
      <input class="inp up" id="h-num" inputmode="text" autocomplete="off" oninput="hoursRender()"/>
      <div id="h-fields" style="margin-top:12px"></div>
      <div class="err" id="h-err"></div>
      <button class="btn primary" id="h-submit" onclick="submitHours()">Enviar</button>
    </div>
    <!-- 加班登入 -->
    <div class="view" id="v-otgate">
      <button class="back" onclick="home()">‹</button>
      <div class="card">
        <div class="ic">🔒</div>
        <div class="t" id="otg-t">Overtime</div>
        <div id="otg-step1">
          <input class="inp" id="ot-uid" autocomplete="off" placeholder="N.º"/>
          <input type="password" class="inp" id="ot-pass" autocomplete="off" placeholder="Contraseña" onkeydown="if(event.key==='Enter')otLogin()"/>
        </div>
        <div id="otg-step2" style="display:none">
          <div class="s" id="otg-chg">Nueva contraseña</div>
          <input type="password" class="inp" id="ot-new1" placeholder="Nueva"/>
          <input type="password" class="inp" id="ot-new2" placeholder="Repetir" onkeydown="if(event.key==='Enter')otDoChange()"/>
        </div>
        <div class="err" id="otg-err"></div>
        <button class="btn primary" id="otg-btn" onclick="otLogin()">Entrar</button>
      </div>
    </div>
    <!-- 加班申請 -->
    <div class="view" id="v-ot">
      <button class="back" onclick="home()">‹</button>
      <button class="btn ghost" id="ot-mylist-btn" style="margin-bottom:10px" onclick="otShowMy()">📋 <span id="ot-mylist-lbl">Mis solicitudes</span><span id="ot-badge" class="badge-dot" style="display:none"></span></button>
      <label class="lbl" id="l-ot-group">Grupo</label>
      <select class="inp" id="ot-group"><option value="MT-1">MT-1</option><option value="MT-2">MT-2</option><option value="MT-3">MT-3</option><option value="MTD">MTD</option><option value="INVENTORY">INVENTORY</option><option value="ON DUTY">ON DUTY</option></select>
      <label class="lbl" id="l-ot-people">Personal (N.º)</label>
      <div style="display:flex;gap:8px">
        <input class="inp" id="ot-p-id" inputmode="text" autocomplete="off" style="flex:1" oninput="otPidLookup()" onkeydown="if(event.key==='Enter'){event.preventDefault();otAddP();}"/>
        <button class="btn ghost" id="ot-addp" style="width:auto;margin:0;padding:0 16px" onclick="otAddP()">＋</button>
      </div>
      <div class="pname" id="ot-p-name" style="min-height:18px"></div>
      <div id="ot-people-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px"></div>
      <label class="lbl" id="l-ot-date">Fecha</label>
      <input class="inp" type="date" id="ot-date"/>
      <label class="lbl" id="l-ot-time">Horario</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input class="inp" type="time" id="ot-start" style="flex:1" oninput="otCalc()"/>
        <span style="color:var(--text3)">~</span>
        <input class="inp" type="time" id="ot-end" style="flex:1" oninput="otCalc()"/>
        <span id="ot-hours" style="font-weight:800;color:var(--accent,#2563eb);white-space:nowrap"></span>
      </div>
      <label class="lbl" id="l-ot-kind">Tipo de equipo</label>
      <select class="inp" id="ot-kind"></select>
      <label class="lbl" id="l-ot-num">Número</label>
      <input class="inp up" id="ot-num" inputmode="text" autocomplete="off"/>
      <label class="lbl" id="l-ot-reason">Motivo</label>
      <input class="inp" id="ot-reason" autocomplete="off"/>
      <label class="lbl" id="l-ot-app">Solicitante</label>
      <div id="ot-app-name" style="font-size:15px;font-weight:700;padding:4px 2px"></div>
      <div class="err" id="ot-err"></div>
      <button class="btn primary" id="ot-submit" onclick="otReview()">Enviar</button>
      <div id="ot-remind" style="font-size:12px;color:var(--text3);margin-top:14px;white-space:pre-line;text-align:center"></div>
    </div>
    <!-- 加班確認 -->
    <div class="view" id="v-otconfirm">
      <button class="back" onclick="show('ot')">‹</button>
      <div class="card" style="text-align:left">
        <div class="t" id="otc-t" style="text-align:center">Confirmar</div>
        <div id="otc-detail" style="font-size:14px;line-height:2;margin:10px 0"></div>
        <div class="row2">
          <button class="btn primary" id="otc-send" onclick="otConfirmSend()">Enviar</button>
          <button class="btn ghost" id="otc-back" onclick="show('ot')">Volver</button>
        </div>
      </div>
    </div>
    <!-- 我的申請 -->
    <div class="view" id="v-otlist">
      <button class="back" onclick="show('ot')">‹</button>
      <div id="otmy-list" style="margin-top:8px"></div>
    </div>
    <!-- 完成 -->
    <div class="view" id="v-done">
      <div class="card">
        <div class="ic">✅</div>
        <div class="t" id="d-t">¡Enviado!</div>
        <div class="s" id="d-detail"></div>
        <div class="row2">
          <button class="btn primary" id="d-again" onclick="again()">Otro</button>
          <button class="btn ghost" id="d-end" onclick="home()">Fin</button>
        </div>
        <button class="btn ghost" id="d-withdraw" style="display:none;margin-top:8px;color:var(--red)" onclick="otWithdraw()"></button>
      </div>
    </div>
  </div>
  <div class="foot">CCT · Colon Container Terminal</div>
</div>
<script>
const FB='https://tesm-c9396-default-rtdb.firebaseio.com';
const GAS='https://script.google.com/macros/s/AKfycbxliEkHrCaCXAiHza1N0r4Ji80we61tDGbF_kg3GGjAkt-e93zznlFYGrj2lwHcRK5b/exec';
const PA_TZ='America/Panama';
const DEFAULT_KINDS=['GC','RTG','AR','SL','ESL','TR','CH','FL','PPG','SP'];
const DEFAULT_STATUSES=['Available','Running','Emergency Maintenance','Out Of Service','Planned Maintenance','Damaged'];
const ALIAS={AR:'ARMGC'};
const SC={'Available':{bg:'#dcfce7',fg:'#166534'},'Running':{bg:'#dbeafe',fg:'#1e40af'},'Emergency Maintenance':{bg:'#ffedd5',fg:'#9a3412'},'Out Of Service':{bg:'#e2e8f0',fg:'#334155'},'Planned Maintenance':{bg:'#ede9fe',fg:'#5b21b6'},'Damaged':{bg:'#fee2e2',fg:'#991b1b'}};
const I18N={
  es:{sub:'Registro en campo',status:'Estado',hours:'Horas',kind:'Tipo de equipo',num:'Número',statusL:'Estado',person:'Personal (N.º de empleado)',submit:'Enviar',again:'Otro registro',end:'Finalizar',done:'¡Enviado!',pass:'Contraseña',enter:'Entrar',hgSub:'Ingrese la contraseña',wrong:'Contraseña incorrecta',noPass:'Contraseña no configurada',errS:'Complete tipo, número, estado y personal',errH:'Ingrese número y al menos una hora',noCats:'Este tipo no tiene categorías',last:'Ant.:',cur:'Actual:',notFound:'No está en la lista — se usará el texto',ot:'Horas extra',otPass:'Contraseña de horas extra',group:'Sección',people:'Personal (N.º)',date:'Fecha',reason:'Motivo',applicant:'Solicitante (N.º jefe)',otErr:'Complete grupo, al menos un personal, número, motivo y solicitante',notAllowed:'Este solicitante no tiene permiso de horas extra',confirmT:'Confirmar solicitud',confirmSend:'Confirmar y enviar',backEdit:'Volver',withdraw:'Retirar solicitud',withdrawQ:'¿Retirar esta solicitud?',withdrawn:'Retirado',otLoginT:'Horas extra',uid:'N.º de empleado',upass:'Contraseña',login:'Entrar',wrongLogin:'N.º o contraseña incorrectos',noMobilePerm:'Sin permiso de horas extra (móvil)',chgT:'Nueva contraseña',newpw:'Nueva contraseña',newpw2:'Repita la contraseña',pwshort:'Mínimo 4 caracteres',pwmis:'No coinciden',applicantIs:'Solicitante',timeRange:'Horario',hoursUnit:'h',needTime:'Ingrese hora de inicio y fin',myList:'Mis solicitudes',myEmpty:'Sin solicitudes recientes',stW1:'Pend. aprob. 1',stW2:'Pend. aprob. 2',stAp:'Aprobado',stRj:'Rechazado',stCan:'Retirado',recent3:'Últimos 3 días'},
  zh:{sub:'現場登錄',status:'狀態',hours:'時數',kind:'車機種類',num:'編號',statusL:'狀態',person:'人員（員工編號）',submit:'送出',again:'再填一筆',end:'結束',done:'已送出',pass:'密碼',enter:'進入',hgSub:'請輸入密碼',wrong:'密碼錯誤',noPass:'尚未設定密碼',errS:'請填種類、編號、狀態、人員',errH:'請填編號、至少一個時數',noCats:'此機型未設定時數種類',last:'上次：',cur:'目前：',notFound:'不在名單 — 將直接使用此文字',ot:'加班',otPass:'加班密碼',group:'課別',people:'人員（編號）',date:'加班日期',reason:'原因',applicant:'申請人（組長編號）',otErr:'請填組別、至少一位人員、編號、原因、申請人',notAllowed:'此申請人沒有加班申請權限',confirmT:'確認申請內容',confirmSend:'確定送出',backEdit:'返回修改',withdraw:'撤回申請',withdrawQ:'確定撤回這筆申請？',withdrawn:'已撤回',otLoginT:'加班申請',uid:'員工編號',upass:'密碼',login:'登入',wrongLogin:'編號或密碼錯誤',noMobilePerm:'沒有手機加班申請權限',chgT:'設定新密碼',newpw:'新密碼',newpw2:'再輸入一次',pwshort:'密碼至少4碼',pwmis:'兩次不一致',applicantIs:'申請人',timeRange:'加班時間',hoursUnit:'小時',needTime:'請填開始與結束時間',myList:'我的申請',myEmpty:'最近沒有申請',stW1:'待一段審核',stW2:'待二段審核',stAp:'已核准',stRj:'已駁回',stCan:'已撤回',recent3:'最近3天'},
  en:{sub:'Field entry',status:'Status',hours:'Hours',kind:'Equipment type',num:'Number',statusL:'Status',person:'Staff (employee no.)',submit:'Submit',again:'New entry',end:'Finish',done:'Submitted!',pass:'Password',enter:'Enter',hgSub:'Enter password',wrong:'Wrong password',noPass:'Password not set',errS:'Fill type, number, status and staff',errH:'Enter number and at least one hour',noCats:'No hour categories for this type',last:'Last:',cur:'Current:',notFound:'Not in list — text will be used',ot:'Overtime',otPass:'Overtime password',group:'Section',people:'Personnel (ID)',date:'Date',reason:'Reason',applicant:'Applicant (leader ID)',otErr:'Fill group, at least one person, number, reason and applicant',notAllowed:'This applicant has no overtime permission',confirmT:'Confirm request',confirmSend:'Confirm & send',backEdit:'Back',withdraw:'Withdraw',withdrawQ:'Withdraw this request?',withdrawn:'Withdrawn',otLoginT:'Overtime',uid:'Employee ID',upass:'Password',login:'Sign in',wrongLogin:'Wrong ID or password',noMobilePerm:'No mobile overtime permission',chgT:'Set new password',newpw:'New password',newpw2:'Repeat password',pwshort:'At least 4 characters',pwmis:'Do not match',applicantIs:'Applicant',timeRange:'Time',hoursUnit:'h',needTime:'Enter start and end time',myList:'My requests',myEmpty:'No recent requests',stW1:'Awaiting 1',stW2:'Awaiting 2',stAp:'Approved',stRj:'Rejected',stCan:'Withdrawn',recent3:'Last 3 days'}
};
let LANG=localStorage.getItem('app_lang')||'es';
let KINDS=DEFAULT_KINDS.slice(), STATUSES=DEFAULT_STATUSES.slice(), STAFF={}, HDEFS={};
let flow='status', hoursOK=false, otOK=false;
let OTC={allowed:{},reminder:{}}, otPeople=[], USERS_APP={}, otUser=null, otPendId=null, OT_MY=[];
function daysAgoStr(n){ return new Date(Date.now()-n*86400000).toLocaleString('en-CA',{timeZone:PA_TZ}).slice(0,10); }
function panamaDate(){ return new Date().toLocaleString('en-CA',{timeZone:PA_TZ}).slice(0,10); }
function calcHours(s,e){ if(!s||!e) return null; const a=s.split(':').map(Number),b=e.split(':').map(Number); let m=(b[0]*60+b[1])-(a[0]*60+a[1]); if(m<=0)m+=1440; return Math.round(m/60*10)/10; }
function otCalc(){ const hh=calcHours($('ot-start').value,$('ot-end').value); $('ot-hours').textContent=(hh!=null)?(hh+' '+L().hoursUnit):''; }
function L(){ return I18N[LANG]||I18N.es; }
function canon(k){ return ALIAS[k]||k; }
function key(k,n){ return (k+'-'+n).replace(/[\/\.\#\$\[\]]/g,'_'); }
function now(){ return new Date().toLocaleString('zh-TW',{timeZone:PA_TZ}); }
function cats(t){ return (HDEFS[t]||[]).filter(Boolean); }
function $(id){ return document.getElementById(id); }
function show(v){ ['home','status','hgate','hours','otgate','ot','otconfirm','otlist','done'].forEach(x=>$('v-'+x).classList.toggle('on',x===v)); }

async function load(){
  try{ const r=await fetch(FB+'/field_kinds.json'); const d=await r.json(); if(Array.isArray(d)&&d.length) KINDS=d; }catch(e){}
  try{ const r=await fetch(FB+'/field_statuses.json'); const d=await r.json(); if(Array.isArray(d)&&d.length) STATUSES=d; }catch(e){}
  try{ const r=await fetch(FB+'/hours_defs.json'); HDEFS=(await r.json())||{}; }catch(e){}
  try{ const r=await fetch(FB+'/staff.json'); STAFF=(await r.json())||{}; }catch(e){}
  try{ const r=await fetch(FB+'/ot_config.json'); OTC=(await r.json())||{}; }catch(e){ OTC={}; } if(!OTC.allowed)OTC.allowed={}; if(!OTC.reminder)OTC.reminder={};
  try{ const r=await fetch(FB+'/users.json'); USERS_APP=(await r.json())||{}; }catch(e){ USERS_APP={}; }
  buildSelects(); applyLang();
}
function buildSelects(){
  $('s-kind').innerHTML=KINDS.map(k=>`<option value="${k}">${k}</option>`).join('');
  $('s-status').innerHTML=STATUSES.map(s=>`<option value="${s}">${s}</option>`).join('');
  const hk=KINDS.filter(k=>cats(canon(k)).length>0);
  $('h-kind').innerHTML=hk.map(k=>`<option value="${k}">${k}</option>`).join('');
  $('ot-kind').innerHTML=KINDS.map(k=>`<option value="${k}">${k}</option>`).join('');
}
function setLang(l){ LANG=l; localStorage.setItem('app_lang',l); applyLang(); }
function applyLang(){
  const t=L(); document.documentElement.lang=LANG;
  document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('on',b.dataset.l===LANG));
  const set=(id,v)=>{ const e=$(id); if(e) e.textContent=v; };
  set('hdr-sub',t.sub); set('t-status',t.status); set('t-hours',t.hours);
  set('l-s-kind',t.kind); set('l-s-num',t.num); set('l-s-status',t.statusL); set('l-s-person',t.person);
  set('l-h-kind',t.kind); set('l-h-num',t.num);
  set('s-submit',t.submit); set('h-submit',t.submit);
  set('hg-t',t.hours); set('hg-s',t.hgSub); set('hg-btn',t.enter);
  set('d-t',t.done); set('d-again',t.again); set('d-end',t.end);
  set('t-ot',t.ot); set('otg-t',t.otLoginT); set('otg-btn',t.login);
  const uid=$('ot-uid'),op=$('ot-pass'); if(uid)uid.placeholder=t.uid; if(op)op.placeholder=t.upass;
  set('otg-chg',t.chgT); const n1=$('ot-new1'),n2=$('ot-new2'); if(n1)n1.placeholder=t.newpw; if(n2)n2.placeholder=t.newpw2;
  set('l-ot-group',t.group); set('l-ot-people',t.people); set('l-ot-date',t.date); set('l-ot-kind',t.kind); set('l-ot-num',t.num); set('l-ot-reason',t.reason); set('l-ot-app',t.applicant); set('ot-submit',t.submit);
  set('otc-t',t.confirmT); set('otc-send',t.confirmSend); set('otc-back',t.backEdit); set('d-withdraw',t.withdraw); set('l-ot-time',t.timeRange); set('ot-mylist-lbl',t.myList);
}
function home(){ show('home'); }
function goStatus(){
  flow='status'; $('s-num').value=''; $('s-person').value=''; $('s-pname').textContent=''; $('s-cur').innerHTML=''; $('s-err').textContent='';
  show('status');
}
function goHours(){
  flow='hours';
  if(hoursOK){ enterHours(); } else { $('hg-err').textContent=''; $('h-pass').value=''; show('hgate'); }
}
async function hoursUnlock(){
  const t=L(); let pass=null;
  try{ const r=await fetch(FB+'/field_pass.json'); pass=await r.json(); }catch(e){}
  const val=($('h-pass').value||'').trim();
  if(!pass){ $('hg-err').textContent=t.noPass; return; }
  if(val!==String(pass)){ $('hg-err').textContent=t.wrong; return; }
  hoursOK=true; enterHours();
}
function enterHours(){ $('h-num').value=''; $('h-err').textContent=''; show('hours'); hoursRender(); }

async function statusCur(){
  const el=$('s-cur'); const k=canon($('s-kind').value); const n=($('s-num').value||'').trim().toUpperCase();
  if(!n){ el.innerHTML=''; return; }
  const kk=key(k,n); let html='';
  try{ const r=await fetch(FB+'/equipment/'+kk+'.json'); const d=await r.json();
    if(d&&d.status){ const s=SC[d.status]; html+=`${L().cur} <span class="st" style="${s?`background:${s.bg};color:${s.fg}`:''}">${d.status}</span>`; } }catch(e){}
  try{ const r=await fetch(FB+'/eq_hours/'+kk+'.json'); const d=await r.json();
    if(d&&d.vals){ const cs=cats(k).filter(c=>d.vals[c]!=null); if(cs.length) html+=` <span class="hrs">｜${cs.map(c=>c+':'+d.vals[c]).join('  ')}</span>`; } }catch(e){}
  el.innerHTML=html;
}
function personLookup(){
  const el=$('s-pname'); const id=($('s-person').value||'').trim();
  if(!id){ el.textContent=''; el.className='pname'; return; }
  const name=STAFF[id]||STAFF[id.toUpperCase()];
  if(name){ el.textContent=name; el.className='pname'; }
  else { el.textContent=L().notFound; el.className='pname miss'; }
}
async function hoursRender(){
  const c=canon($('h-kind').value); const n=($('h-num').value||'').trim().toUpperCase();
  const wrap=$('h-fields'); const cs=cats(c);
  if(!cs.length){ wrap.innerHTML=`<div class="cur">${L().noCats}</div>`; return; }
  let prev={};
  if(n){ try{ const r=await fetch(FB+'/eq_hours/'+key(c,n)+'.json'); const d=await r.json(); if(d&&d.vals) prev=d.vals; }catch(e){} }
  wrap.innerHTML=cs.map(cat=>{
    const last=(prev[cat]!=null)?`<small>${L().last} ${prev[cat]}</small>`:'';
    return `<div class="hrow"><div class="hl">${cat}${last}</div><input class="hcat" data-cat="${cat.replace(/"/g,'')}" type="number" inputmode="numeric" placeholder="—"/></div>`;
  }).join('');
}
async function submitStatus(){
  const t=L(); const dk=$('s-kind').value, k=canon(dk);
  const n=($('s-num').value||'').trim().toUpperCase();
  const st=$('s-status').value; const pid=($('s-person').value||'').trim();
  if(!n||!st||!pid){ $('s-err').textContent=t.errS; return; }
  $('s-err').textContent='';
  const person=STAFF[pid]||STAFF[pid.toUpperCase()]||pid; const id=k+'-'+n, kk=key(k,n), tnow=now();
  const btn=$('s-submit'); btn.disabled=true;
  try{
    await fetch(FB+'/equipment/'+kk+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({machine_id:id,machine_type:k,status:st,crew:person,note:'',last_updated:tnow})});
    fetch(GAS+'?'+new URLSearchParams({action:'write',machine_kind:k,number:n,status:st,process:'Field',crew:person}),{method:'GET',mode:'no-cors'});
  }catch(e){ $('s-err').textContent='✗ '+e.message; btn.disabled=false; return; }
  btn.disabled=false; $('d-detail').textContent=`${id} — ${st}　(${person})`; show('done');
}
async function submitHours(){
  const t=L(); const c=canon($('h-kind').value); const n=($('h-num').value||'').trim().toUpperCase();
  const ins=[...document.querySelectorAll('#h-fields .hcat')]; const filled={};
  ins.forEach(i=>{ const v=i.value.trim(); if(v!=='') filled[i.getAttribute('data-cat')]=Number(v); });
  if(!n||!Object.keys(filled).length){ $('h-err').textContent=t.errH; return; }
  $('h-err').textContent='';
  const id=c+'-'+n, kk=key(c,n), tnow=now();
  const btn=$('h-submit'); btn.disabled=true;
  try{
    let vals={};
    try{ const r=await fetch(FB+'/eq_hours/'+kk+'.json'); const d=await r.json(); if(d&&d.vals) vals=d.vals; }catch(e){}
    Object.assign(vals,filled);
    await fetch(FB+'/eq_hours/'+kk+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({vals,time:tnow})});
    Object.entries(filled).forEach(([k2,hv])=>{ fetch(FB+'/eq_hours_log.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({machine_id:id,kind:k2,hours:hv,time:tnow})}).catch(()=>{}); });
  }catch(e){ $('h-err').textContent='✗ '+e.message; btn.disabled=false; return; }
  btn.disabled=false; $('d-detail').textContent=`${id} — ${Object.entries(filled).map(([k,v])=>k+':'+v).join('  ')}`; show('done');
}
function goOt(){ flow='ot'; if(otUser){ enterOt(); } else { otShowLogin(); } }
function otShowLogin(){ $('otg-err').textContent=''; $('ot-uid').value=''; $('ot-pass').value=''; $('otg-step1').style.display=''; $('otg-step2').style.display='none'; $('otg-btn').setAttribute('onclick','otLogin()'); const t=L(); $('otg-btn').textContent=t.login; show('otgate'); }
async function otLogin(){ const t=L(); const id=($('ot-uid').value||'').trim(); const pass=($('ot-pass').value||'').trim();
  if(!USERS_APP||!Object.keys(USERS_APP).length){ try{ const r=await fetch(FB+'/users.json'); USERS_APP=(await r.json())||{}; }catch(e){} }
  const u=USERS_APP[id]; if(!u||String(u.pass)!==pass){ $('otg-err').textContent=t.wrongLogin; return; }
  otPendId=id;
  if(u.mustChange){ $('otg-step1').style.display='none'; $('otg-step2').style.display=''; $('ot-new1').value=''; $('ot-new2').value=''; $('otg-err').textContent=''; $('otg-btn').setAttribute('onclick','otDoChange()'); $('otg-btn').textContent=t.confirmSend; return; }
  otFinishLogin(id,u);
}
async function otDoChange(){ const t=L(); const id=otPendId; const n1=($('ot-new1').value||'').trim(), n2=($('ot-new2').value||'').trim();
  if(n1.length<4){ $('otg-err').textContent=t.pwshort; return; } if(n1!==n2){ $('otg-err').textContent=t.pwmis; return; }
  try{ await fetch(FB+'/users/'+encodeURIComponent(id)+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({pass:n1,mustChange:false})}); }catch(e){ $('otg-err').textContent='✗ '+e.message; return; }
  if(USERS_APP[id]){ USERS_APP[id].pass=n1; USERS_APP[id].mustChange=false; }
  otFinishLogin(id,USERS_APP[id]);
}
function otFinishLogin(id,u){ const t=L(); const perm=u.perms&&u.perms.ot_mobile&&u.perms.ot_mobile.v; if(!perm){ $('otg-err').textContent=t.noMobilePerm; return; } otUser={id,name:(STAFF[id]||u.name||id)}; enterOt(); }
function enterOt(){ otPeople=[]; ['ot-num','ot-reason','ot-p-id','ot-start','ot-end'].forEach(i=>$(i).value=''); $('ot-hours').textContent=''; $('ot-app-name').textContent=otUser?('👤 '+otUser.name):''; $('ot-p-name').textContent=''; $('ot-date').value=panamaDate(); renderOtPeople(); $('ot-remind').textContent=(OTC.reminder&&OTC.reminder[LANG])||''; $('ot-err').textContent=''; show('ot'); otLoadMy(); }
function renderOtPeople(){ const el=$('ot-people-list'); el.innerHTML=otPeople.map((p,i)=>`<span class="chip" onclick="otDelP(${i})">${p.id}·${p.name} ✕</span>`).join(''); }
function otDelP(i){ otPeople.splice(i,1); renderOtPeople(); }
function otPidLookup(){ const id=($('ot-p-id').value||'').trim(); $('ot-p-name').textContent=id?(STAFF[id]||STAFF[id.toUpperCase()]||L().notFound):''; }
function otAddP(){ const id=($('ot-p-id').value||'').trim(); if(!id) return; const name=STAFF[id]||STAFF[id.toUpperCase()]||id; otPeople.push({id,name}); $('ot-p-id').value=''; $('ot-p-name').textContent=''; renderOtPeople(); }
function otAppLookup(){ const id=($('ot-app').value||'').trim(); $('ot-app-name').textContent=id?(STAFF[id]||STAFF[id.toUpperCase()]||L().notFound):''; }
let lastOtId=null;
function otReview(){ const t=L();
  const group=($('ot-group').value||'').trim(); const num=($('ot-num').value||'').trim().toUpperCase(); const reason=($('ot-reason').value||'').trim();
  const date=$('ot-date').value; const type=canon($('ot-kind').value);
  if(!otUser){ otShowLogin(); return; }
  const start=$('ot-start').value, end=$('ot-end').value;
  if(!group||!otPeople.length||!num||!reason){ $('ot-err').textContent=t.otErr; return; }
  if(!start||!end){ $('ot-err').textContent=t.needTime; return; }
  $('ot-err').textContent='';
  const hrs=calcHours(start,end);
  $('otc-detail').innerHTML=`<b>${t.group}</b>: ${group}<br><b>${t.people}</b>: ${otPeople.map(p=>p.name).join('、')}<br><b>${t.date}</b>: ${date} ${start}~${end}（${hrs}${t.hoursUnit}）<br><b>${t.kind}</b>: ${type}-${num}<br><b>${t.reason}</b>: ${reason}<br><b>${t.applicantIs}</b>: ${otUser.name}`;
  show('otconfirm');
}
async function otConfirmSend(){ const t=L();
  const group=($('ot-group').value||'').trim(); const date=$('ot-date').value; const type=canon($('ot-kind').value); const num=($('ot-num').value||'').trim().toUpperCase(); const reason=($('ot-reason').value||'').trim();
  const start=$('ot-start').value, end=$('ot-end').value, hours=calcHours(start,end);
  const rec={group,people:otPeople.slice(),date,start_time:start,end_time:end,hours,machine_type:type,machine_num:num,reason,applicant:{id:otUser.id,name:otUser.name},status:'pending',stage:'section',created:now()};
  const btn=$('otc-send'); btn.disabled=true;
  try{ const r=await fetch(FB+'/ot_requests.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(rec)}); const j=await r.json(); lastOtId=(j&&j.name)||null; }catch(e){ btn.disabled=false; show('ot'); $('ot-err').textContent='✗ '+e.message; return; }
  btn.disabled=false; $('d-detail').textContent=`${type}-${num} · ${date} · ${otUser.name}`;
  $('d-withdraw').style.display=lastOtId?'block':'none'; show('done');
}
async function otLoadMy(){ if(!otUser) return; let all={}; try{ const r=await fetch(FB+'/ot_requests.json'); all=(await r.json())||{}; }catch(e){}
  const th=daysAgoStr(3);
  OT_MY=Object.values(all).filter(r=>r&&r.applicant&&r.applicant.id===otUser.id&&(r.date||'')>=th).sort((x,y)=>String(y.created||'').localeCompare(String(x.created||'')));
  const n=OT_MY.filter(r=>r.status==='approved'||r.status==='rejected').length;
  const b=$('ot-badge'); if(b){ if(n>0){ b.textContent=n; b.style.display='inline-flex'; } else b.style.display='none'; }
}
function otMyStatus(r){ const t=L(); if(r.status==='cancelled')return{x:t.stCan,c:'#64748b'}; if(r.status==='approved')return{x:t.stAp,c:'#16a34a'}; if(r.status==='rejected')return{x:t.stRj,c:'#dc2626'}; if(r.stage==='manager')return{x:t.stW2,c:'#d97706'}; return{x:t.stW1,c:'#d97706'}; }
async function otShowMy(){ const t=L(); await otLoadMy();
  const el=$('otmy-list');
  el.innerHTML=`<div style="font-size:13px;color:var(--text3);margin-bottom:8px">${t.recent3}</div>`+(OT_MY.length?OT_MY.map(r=>{ const s=otMyStatus(r); const ppl=(r.people||[]).map(p=>p.name).join('、'); return `<div style="border:1px solid var(--line2,#e2e8f0);border-radius:10px;padding:10px 12px;margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px"><b>${r.machine_type}-${r.machine_num}</b><span style="color:var(--text3);font-size:13px">${r.date||''} ${r.start_time?r.start_time+'~'+r.end_time:''}</span><span style="margin-left:auto;font-weight:800;color:${s.c}">${s.x}</span></div><div style="font-size:13px;color:var(--text2);margin-top:4px">${r.group||''} · ${ppl}</div>${r.reject?`<div style="font-size:12px;color:#dc2626;margin-top:4px">✗ ${(r.reject.reason&&(r.reject.reason[LANG]||r.reject.reason.zh))||r.reject.reason||''}</div>`:''}</div>`; }).join(''):`<div style="text-align:center;color:var(--text3);padding:24px">${t.myEmpty}</div>`);
  show('otlist');
}
async function otWithdraw(){ const t=L(); if(!lastOtId) return; if(!confirm(t.withdrawQ)) return;
  try{ await fetch(FB+'/ot_requests/'+lastOtId+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'cancelled',stage:'done'})}); }catch(e){}
  lastOtId=null; $('d-withdraw').style.display='none'; $('d-detail').textContent=t.withdrawn;
}
function again(){ if(flow==='status') goStatus(); else if(flow==='ot'){ $('d-withdraw').style.display='none'; enterOt(); } else enterHours(); }
load();
</script>
